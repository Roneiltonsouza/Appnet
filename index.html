<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Cloud Auth</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f97316; /* Laranja do seu sistema de login */
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Esconder telas inicialmente */
        #main-content, #auth-screen { display: none; }

        .app-card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div id="auth-screen" class="w-full max-w-sm p-6 bg-gray-800 rounded-xl shadow-lg border border-gray-700">
    <h2 class="text-center text-orange-500 font-bold mb-4 uppercase tracking-wider">Acesso ao Sistema</h2>
    <input type="text" id="userId" placeholder="Digite seu Nome ou ID" 
           class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 focus:border-orange-500 outline-none mb-4 text-white text-center">
    <button onclick="entrar()" 
            class="w-full py-4 bg-orange-600 hover:bg-orange-500 transition-all rounded-lg font-black text-white shadow-xl">
        ENTRAR AGORA
    </button>
</div>

<div id="main-content" class="w-full h-screen flex flex-col">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700">
        <div class="flex flex-col">
            <span class="font-bold text-orange-500">☁️ Appnet Pro</span>
            <small id="userDisplay" class="text-gray-400 text-xs"></small>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('apkInput').click()" class="bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm text-white">+ APK</button>
            <button onclick="sair()" class="text-gray-500 text-xs">Sair</button>
        </div>
    </header>

    <input type="file" id="apkInput" accept=".apk" class="hidden">

    <div class="container mx-auto p-6 max-w-4xl flex-1 overflow-y-auto" id="appList">
        </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaXS671Suw8veFfGDffh1L8rhc2C6eBWYKy5b",
        databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com", // IMPORTANTE: Coloque sua URL do Realtime Database aqui
        projectId: "seu-projeto-id",
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let currentUser = localStorage.getItem('appnet_user');

    // Inicialização do App
    window.onload = () => {
        if (currentUser) {
            showMain();
        } else {
            document.getElementById('auth-screen').style.display = 'block';
        }
    };

    function entrar() {
        const id = document.getElementById('userId').value.trim().toLowerCase();
        if (id.length < 3) return alert("Digite um nome válido!");
        
        localStorage.setItem('appnet_user', id);
        currentUser = id;
        showMain();
    }

    function sair() {
        localStorage.removeItem('appnet_user');
        location.reload();
    }

    function showMain() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        document.getElementById('userDisplay').innerText = "Conta: " + currentUser;
        renderList();
    }

    // Lógica de Upload e Sincronização
    document.getElementById('apkInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const btn = document.querySelector('button[onclick*="apkInput"]');
        btn.innerText = "⏳...";
        
        const reader = new FileReader();
        reader.onload = async function() {
            const appData = {
                name: file.name,
                size: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                date: new Date().toLocaleDateString('pt-BR'),
                fileData: reader.result // Nota: Para arquivos grandes, o Firebase Storage é melhor que o Database
            };

            // Salva na nuvem usando o ID do usuário como chave
            await database.ref('users/' + currentUser + '/apks/' + btoa(file.name).replace(/=/g, "")).set(appData);
            btn.innerText = "+ APK";
            renderList();
        };
        reader.readAsDataURL(file);
    });

    function renderList() {
        const list = document.getElementById('appList');
        database.ref('users/' + currentUser + '/apks').on('value', (snapshot) => {
            list.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.innerHTML = `
                        <div class="info">
                            <b class="text-white">${app.name}</b>
                            <small class="text-gray-400">${app.size} • ${app.date}</small>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="downloadApp('${btoa(app.name).replace(/=/g, "")}')" class="text-orange-500 border border-orange-500 px-3 py-1 rounded-lg text-sm">Baixar</button>
                            <button onclick="deleteApp('${btoa(app.name).replace(/=/g, "")}')" class="text-red-500 text-sm">Excluir</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } else {
                list.innerHTML = `<p class="text-center text-gray-600 mt-10">Nenhum APK salvo nesta conta.</p>`;
            }
        });
    }

    async function downloadApp(id) {
        database.ref('users/' + currentUser + '/apks/' + id).once('value', (snapshot) => {
            const app = snapshot.val();
            const a = document.createElement('a');
            a.href = app.fileData;
            a.download = app.name;
            a.click();
        });
    }

    function deleteApp(id) {
        if(confirm("Excluir da nuvem?")) {
            database.ref('users/' + currentUser + '/apks/' + id).remove();
        }
    }
</script>
</body>
</html>
