<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Cloud Store</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #ff4500; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .app-card { background: var(--card); border: 1px solid #232a3d; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .neon-border { border: 1px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        #geradorMenu { display: none; position: fixed; inset: 0; background: #0b0f1a; z-index: 100; }
        .btn-whatsapp { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 30px; box-shadow: 0 0 15px rgba(37, 211, 102, 0.5); z-index: 90; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

<a href="https://wa.me/5588992144865" target="_blank" class="btn-whatsapp">
    <i class="fab fa-whatsapp"></i>
</a>

<div id="geradorMenu" class="flex flex-col">
    <header class="p-4 bg-gray-900 border-b border-orange-600 flex justify-between items-center">
        <span class="font-black text-orange-600 uppercase tracking-widest">Painel de Controle</span>
        <button onclick="document.getElementById('geradorMenu').style.display='none'" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-full text-[10px] font-black border border-red-500/30">SAIR</button>
    </header>
    <div class="p-6 flex flex-col items-center">
        <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" class="w-full max-w-xs bg-orange-600 p-5 rounded-2xl font-black shadow-lg mb-8 text-white uppercase tracking-tighter">
            <i class="fas fa-cloud-upload-alt mr-2"></i> Adicionar Novo APK
        </button>
        <input type="file" id="apkInput" accept=".apk" class="hidden">
        <div id="adminList" class="w-full max-w-2xl"></div>
    </div>
</div>

<header class="bg-gray-900/50 backdrop-blur-md p-5 flex justify-between items-center border-b border-white/5 sticky top-0 z-50">
    <div class="flex flex-col">
        <span class="font-black text-orange-600 text-2xl tracking-tighter leading-none">APPNET PRO</span>
        <span class="text-[9px] text-gray-500 font-bold uppercase tracking-[3px]">Sua Nuvem de Apps</span>
    </div>
    <div class="flex gap-4 items-center">
        <a href="https://wa.me/5588992144865" class="text-green-500 text-xl"><i class="fab fa-whatsapp"></i></a>
        <button onclick="solicitarSenha()" class="bg-white/5 p-2 rounded-lg"><i class="fas fa-lock text-gray-500"></i></button>
    </div>
</header>

<main id="appList" class="p-4 flex-1 overflow-y-auto max-w-4xl mx-auto w-full grid grid-cols-1 gap-4">
    <div class="text-center mt-20 text-slate-600 animate-pulse font-bold uppercase text-xs tracking-widest">Sincronizando arquivos...</div>
</main>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaLXKFaZONAeHabdqOV3b0VE6ISpPUMvLkNKa",
        authDomain: "appnet-pro.firebaseapp.com",
        projectId: "appnet-pro",
        storageBucket: "appnet-pro.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function solicitarSenha() {
        const pass = prompt("Senha Administrativa:");
        if (pass === "Appnetrdgapi") {
            document.getElementById('geradorMenu').style.display = 'flex';
        } else if (pass) { alert("Senha Incorreta!"); }
    }

    document.getElementById("apkInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const btn = document.getElementById("uploadBtn");
        btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ENVIANDO...`;
        btn.disabled = true;

        try {
            const ref = storage.ref('apks/' + file.name);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection("arquivos").add({
                nome: file.name,
                url: url,
                tamanho: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                criadoEm: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("APK Salvo com Sucesso!");
        } catch (err) {
            alert("Erro! Certifique-se que o Storage está em 'Modo de Teste'.");
        } finally {
            btn.innerHTML = `<i class="fas fa-cloud-upload-alt mr-2"></i> Adicionar Novo APK`;
            btn.disabled = false;
        }
    });

    db.collection("arquivos").orderBy("criadoEm", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById("appList");
        const adminList = document.getElementById("adminList");
        list.innerHTML = "";
        adminList.innerHTML = "";

        snapshot.forEach((doc) => {
            const data = doc.data();
            list.innerHTML += `
                <div class="app-card p-5 flex justify-between items-center">
                    <div class="truncate pr-4 flex-1">
                        <div class="text-[13px] font-black uppercase truncate text-white">${data.nome}</div>
                        <div class="text-[10px] text-orange-600 font-bold mt-1 tracking-tighter">${data.tamanho} • NUVEM</div>
                    </div>
                    <a href="${data.url}" class="bg-orange-600 px-6 py-3 rounded-xl text-[11px] font-black uppercase shadow-lg shadow-orange-900/20">Instalar</a>
                </div>`;
            adminList.innerHTML += `
                <div class="bg-slate-900/60 p-4 rounded-2xl mb-3 flex justify-between items-center border border-white/5">
                    <span class="text-[11px] font-bold truncate max-w-[180px] text-gray-400">${data.nome}</span>
                    <button onclick="remover('${doc.id}')" class="bg-red-600/10 text-red-500 p-2 px-3 rounded-lg text-[10px] font-black">EXCLUIR</button>
                </div>`;
        });
    });

    async function remover(id) {
        if (confirm("Tem certeza que deseja apagar este arquivo da nuvem?")) {
            await db.collection("arquivos").doc(id).delete();
        }
    }
</script>
</body>
</html>
