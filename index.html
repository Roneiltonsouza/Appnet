<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    // Configurações do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaLXKFaZONAeHabdqOV3b0VE6ISpPUMvLkNKa",
        authDomain: "appnet-pro.firebaseapp.com",
        projectId: "appnet-pro", // Verifique se o nome do projeto é exatamente esse no painel
        storageBucket: "appnet-pro.appspot.com",
        messagingSenderId: "1234567890", // Opcional por enquanto
        appId: "1:1234567890:web:abcdef" // Opcional por enquanto
    };

    // Inicializando o Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // FUNÇÃO DE UPLOAD (MUITO MAIS SIMPLES)
    document.getElementById("apkInput").addEventListener("change", async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const btn = document.getElementById("uploadBtn");
        btn.innerHTML = `ENVIANDO...`;
        
        try {
            // 1. Sobe o arquivo para o Storage
            const storageRef = storage.ref('apks/' + file.name);
            const task = await storageRef.put(file);
            const url = await task.ref.getDownloadURL();

            // 2. Salva os dados na "Coleção" (substitui a tabela)
            await db.collection("arquivos").add({
                nome: file.name,
                url: url,
                tamanho: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                data: new Date()
            });

            alert("APK enviado com sucesso!");
            loadApps();
        } catch (error) {
            console.error(error);
            alert("Erro ao enviar! Verifique se o Storage está em 'Test Mode'.");
        } finally {
            btn.innerHTML = `ADICIONAR APK NA NUVEM`;
        }
    });

    // FUNÇÃO PARA CARREGAR A LISTA
    async function loadApps() {
        const list = document.getElementById("appList");
        const adminList = document.getElementById("adminList");
        
        db.collection("arquivos").orderBy("data", "desc").onSnapshot((snapshot) => {
            list.innerHTML = "";
            adminList.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const app = doc.data();
                // Renderiza na Loja
                list.innerHTML += `
                    <div class="app-card p-4 rounded-xl mb-3 flex justify-between items-center">
                        <div class="truncate pr-4 flex-1">
                            <div class="text-sm font-bold uppercase truncate">${app.nome}</div>
                            <div class="text-[10px] text-gray-400 font-mono">${app.tamanho}</div>
                        </div>
                        <a href="${app.url}" class="bg-orange-600 px-6 py-2 rounded-lg text-xs font-black">Instalar</a>
                    </div>`;
                
                // Renderiza no Admin
                adminList.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl mb-2 flex justify-between items-center">
                        <span class="text-xs truncate max-w-[150px]">${app.nome}</span>
                        <button onclick="deletar('${doc.id}')" class="text-red-500 text-[10px] font-bold">EXCLUIR</button>
                    </div>`;
            });
        });
    }

    async function deletar(id) {
        if(confirm("Deseja excluir?")) {
            await db.collection("arquivos").doc(id).delete();
        }
    }

    loadApps();
        </script>
