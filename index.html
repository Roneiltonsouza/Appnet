<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILO PREMIUM APPNET */
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* LOGIN ÚNICO */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        /* BOTÃO ADMIN FLUTUANTE */
        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; z-index: 99; box-shadow: 0 4px 15px rgba(0,255,136,0.4); border: none; }

        /* LISTA DE APPS */
        .header { padding: 30px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        .app-grid { padding: 20px; display: grid; gap: 15px; }
        .app-card { background: var(--card); padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--primary); transition: 0.3s; }
        .app-card:active { transform: scale(0.98); }
        
        /* INPUTS E BOTÕES */
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-download { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; border: none; }
        
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: var(--primary); font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2 style="margin:0">Appnet Pro</h2>
        <p style="opacity: 0.7; font-size: 14px;">Acesso à Nuvem</p>
        <input type="text" id="user-name" placeholder="Seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg" style="margin:0; opacity: 0.8;"></p>
    </div>

    <div class="app-grid" id="app-list">
        </div>

    <button class="admin-float-btn" onclick="abrirPainel()">
        <i class="fas fa-tools"></i>
    </button>
</div>

<div id="admin-modal" class="modal">
    <div style="width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative; border: 1px solid #334155;">
        <span class="close-modal" onclick="fecharPainel()">&times;</span>
        <h3 style="margin-top:0">Painel Gerador</h3>
        
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha Administrativa">
            <button class="btn-main" onclick="acessarGerador()">LIBERAR PAINEL</button>
        </div>
        
        <div id="upload-area" class="hidden">
            <input type="text" id="new-app-name" placeholder="Nome do Aplicativo">
            <input type="file" id="new-app-file" accept=".apk">
            <button class="btn-main" id="btn-upload" onclick="uploadNovoApp()">SUBIR PARA NUVEM</button>
            <div id="upload-status" style="margin-top: 15px; text-align: center; color: var(--primary); font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // LOGIN ÚNICO COM TRAVA (LocalStorage)
    function fazerLogin() {
        const nome = document.getElementById('user-name').value;
        if(nome.trim().length < 2) return alert("Digite seu nome!");
        localStorage.setItem('appnet_user_v2', nome);
        carregarSistema(nome);
    }

    function carregarSistema(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Bem-vindo, " + nome;
        fetchApps();
    }

    // LISTAR APPS E SISTEMA DE DOWNLOAD ZIP
    async function fetchApps() {
        const { data, error } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('app-list');
        container.innerHTML = "";

        if(data) {
            data.forEach(app => {
                container.innerHTML += `
                    <div class="app-card">
                        <div>
                            <b style="font-size: 18px;">${app.name}</b><br>
                            <small style="color: #888;">📦 ${app.size}</small>
                        </div>
                        <button class="btn-download" onclick="dispararDownloadZIP('${app.url}', '${app.name}')">BAIXAR</button>
                        ${adminAcesso ? `<button onclick="deletarApp('${app.id}', '${app.file_path}')" style="background:none; border:none; color:#ff4444; margin-left:10px;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                `;
            });
        }
    }

    // FUNÇÃO INTELIGENTE: CONVERTE APK EM ZIP NO DOWNLOAD
    async function dispararDownloadZIP(url, nomeApp) {
        try {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "PROCESSANDO...";
            
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = blobUrl;
            link.setAttribute('download', nomeApp.trim() + ".zip"); // Converte para ZIP automaticamente
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.URL.revokeObjectURL(blobUrl);
            btn.innerText = originalText;
        } catch (e) {
            window.open(url, '_blank');
        }
    }

    // PAINEL ADMIN
    let adminAcesso = false;
    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === "Appnetrdgapi") {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            fetchApps();
        } else {
            alert("Senha Incorreta!");
        }
    }

    // UPLOAD PARA NUVEM (LIBERADO ATÉ 500MB)
    async function uploadNovoApp() {
        const name = document.getElementById('new-app-name').value;
        const file = document.getElementById('new-app-file').files[0];
        const status = document.getElementById('upload-status');

        if(!name || !file) return alert("Selecione o arquivo e dê um nome!");

        status.innerText = "SUBINDO PARA NUVEM...";
        const fileName = Date.now() + "_" + file.name;

        const { data: upData, error: upErr } = await supabaseClient.storage.from('apks').upload(fileName, file);
        if(upErr) return alert("Erro no Storage: " + upErr.message);

        const { data: urlData } = supabaseClient.storage.from('apks').getPublicUrl(fileName);
        
        const { error: dbErr } = await supabaseClient.from('apps').insert([
            { name: name, size: (file.size/(1024*1024)).toFixed(2) + " MB", url: urlData.publicUrl, file_path: fileName }
        ]);

        if(!dbErr) {
            status.innerText = "CONCLUÍDO COM SUCESSO!";
            document.getElementById('new-app-name').value = "";
            fetchApps();
        }
    }

    async function deletarApp(id, path) {
        if(!confirm("Deseja excluir este App da nuvem?")) return;
        await supabaseClient.from('apps').delete().eq('id', id);
        await supabaseClient.storage.from('apks').remove([path]);
        fetchApps();
    }

    // AUTO LOGIN (LOCK)
    window.onload = () => {
        const savedUser = localStorage.getItem('appnet_user_v2');
        if(savedUser) carregarSistema(savedUser);
    }
</script>

</body>
</html>
