<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; }
        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; z-index: 99; border: none; }
        .header { padding: 30px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        .app-grid { padding: 20px; display: grid; gap: 15px; }
        .app-card { background: var(--card); padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--primary); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-download { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: var(--primary); font-size: 30px; cursor: pointer; }
        .app-icon-mini { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; margin-right: 12px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-download-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Appnet Pro</h2>
        <input type="text" id="user-name" placeholder="Seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ACESSAR</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg" style="margin:0; opacity: 0.8;"></p>
    </div>
    <div class="app-grid" id="app-list"></div>
    <button class="admin-float-btn" onclick="abrirPainel()"><i class="fas fa-plus"></i></button>
</div>

<div id="admin-modal" class="modal">
    <div style="width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative;">
        <span class="close-modal" onclick="fecharPainel()">&times;</span>
        <h3>Novo APK</h3>
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha ADM">
            <button class="btn-main" onclick="acessarGerador()">LIBERAR</button>
        </div>
        <div id="upload-area" class="hidden">
            <input type="text" id="new-app-name" placeholder="Nome do App">
            <input type="text" id="new-app-icon" placeholder="URL da Imagem">
            <input type="text" id="new-app-url" placeholder="Link do Google Drive">
            <button class="btn-main" onclick="salvarApp()">CADASTRAR APK</button>
            <div id="upload-status" style="margin-top: 15px; text-align: center; color: var(--primary);"></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const SENHA_MESTRA = "Appnetrdgapi";
    let adminAcesso = false;

    // ESSA FUNÇÃO ABRE A SEGUNDA GUIA AUTOMATICAMENTE PARA DOWNLOAD
    function dispararDownload(url) {
        if(!url) return;
        // Abre nova aba/guia para o download direto
        const win = window.open(url, '_blank');
        if (win) {
            win.focus();
        } else {
            // Caso o navegador bloqueie pop-ups
            location.href = url;
        }
    }

    // Formata o link do Drive para modo Download Direto
    function converterLink(url) {
        if (url.includes("drive.google.com")) {
            let id = "";
            if (url.includes("/d/")) id = url.split("/d/")[1].split("/")[0];
            else if (url.includes("id=")) id = url.split("id=")[1].split("&")[0];
            return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
        }
        return url;
    }

    function fazerLogin() {
        const nome = document.getElementById('user-name').value;
        if(nome.trim() === "") return alert("Digite seu nome!");
        localStorage.setItem('appnet_user_v2', nome);
        carregarSistema(nome);
    }

    function carregarSistema(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "OLÁ, " + nome.toUpperCase();
        listarApps();
    }

    async function listarApps() {
        const { data } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        if(data) {
            data.forEach(app => {
                list.innerHTML += `
                <div class="app-card">
                    <div style="display:flex; align-items:center;">
                        <img src="${app.icon_url || 'https://cdn-icons-png.flaticon.com/512/5738/5738031.png'}" class="app-icon-mini">
                        <div><b>${app.name}</b><br><small style="color:#00ff88">Disponível</small></div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button onclick="dispararDownload('${app.url}')" class="btn-download">BAIXAR</button>
                        ${adminAcesso ? `<button onclick="remover('${app.id}')" style="background:none; border:none; color:red; margin-left:10px;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                </div>`;
            });
        }
    }

    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === SENHA_MESTRA) {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            listarApps();
        } else { alert("Senha Incorreta!"); }
    }

    async function salvarApp() {
        const nome = document.getElementById('new-app-name').value;
        const icon = document.getElementById('new-app-icon').value;
        const link = document.getElementById('new-app-url').value;
        const status = document.getElementById('upload-status');

        if(!nome || !link) return alert("Preencha os campos!");
        
        status.innerText = "Sincronizando Banco...";
        const linkDireto = converterLink(link);

        const { error } = await supabaseClient.from('apps').insert([{ 
            name: nome, icon_url: icon, url: linkDireto 
        }]);

        if(!error) {
            status.innerText = "✅ APK ATUALIZADO NO BANCO!";
            listarApps();
            setTimeout(() => { fecharPainel(); status.innerText = ""; }, 1000);
        } else { alert("Erro na API do Supabase!"); }
    }

    async function remover(id) {
        if(confirm("Excluir APK?")) {
            await supabaseClient.from('apps').delete().eq('id', id);
            listarApps();
        }
    }

    window.onload = () => {
        const user = localStorage.getItem('appnet_user_v2');
        if(user) carregarSistema(user);
    }
</script>
</body>
</html>
