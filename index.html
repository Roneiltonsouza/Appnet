<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; z-index: 99; box-shadow: 0 4px 15px rgba(0,255,136,0.4); border: none; }

        .header { padding: 30px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        .app-grid { padding: 20px; display: grid; gap: 15px; }
        .app-card { background: var(--card); padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--primary); transition: 0.3s; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Estilo do botão de download como link */
        .btn-download { 
            background: var(--primary); 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            display: inline-block;
            transition: 0.2s;
        }
        .btn-download:active { transform: scale(0.95); }
        
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: var(--primary); font-size: 30px; cursor: pointer; }

        .app-icon-mini { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; margin-right: 12px; border: 1px solid #334155; }
        .app-info-box { display: flex; align-items: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2 style="margin:0">Appnet Pro</h2>
        <input type="text" id="user-name" placeholder="Seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg" style="margin:0; opacity: 0.8;"></p>
    </div>
    <div class="app-grid" id="app-list"></div>
    <button class="admin-float-btn" onclick="abrirPainel()"><i class="fas fa-tools"></i></button>
</div>

<div id="admin-modal" class="modal">
    <div style="width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative; border: 1px solid #334155;">
        <span class="close-modal" onclick="fecharPainel()">&times;</span>
        <h3 style="margin-top:0">Novo Aplicativo</h3>
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha Administrativa">
            <button class="btn-main" onclick="acessarGerador()">LIBERAR PAINEL</button>
        </div>
        <div id="upload-area" class="hidden">
            <input type="text" id="new-app-name" placeholder="Nome do App">
            <input type="text" id="new-app-icon" placeholder="URL da Foto do Ícone">
            <input type="text" id="new-app-url" placeholder="Link do Google Drive ou Direto">
            <button class="btn-main" onclick="salvarApp()">SALVAR NA NUVEM</button>
            <div id="upload-status" style="margin-top: 15px; text-align: center; color: var(--primary); font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const SENHA_MESTRA = "Appnetrdgapi";
    let adminAcesso = false;

    // --- FUNÇÃO PARA CONVERTER LINK DRIVE ---
    function formatarLinkDrive(url) {
        if (url.includes("drive.google.com")) {
            let fileId = "";
            if (url.includes("/d/")) {
                fileId = url.split("/d/")[1].split("/")[0];
            } else if (url.includes("id=")) {
                fileId = url.split("id=")[1].split("&")[0];
            }
            if (fileId) {
                // Link de download direto com bypass de confirmação para arquivos grandes
                return `https://drive.google.com/uc?export=download&id=${fileId}&confirm=t`;
            }
        }
        return url;
    }

    function fazerLogin() {
        const nome = document.getElementById('user-name').value;
        if(nome.trim().length < 2) return alert("Digite seu nome!");
        localStorage.setItem('appnet_user_v2', nome);
        carregarSistema(nome);
    }

    function carregarSistema(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "BEM-VINDO, " + nome.toUpperCase();
        fetchApps();
    }

    async function fetchApps() {
        const { data } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('app-list');
        container.innerHTML = "";

        if(data) {
            data.forEach(app => {
                const foto = app.icon_url || 'https://cdn-icons-png.flaticon.com/512/5738/5738031.png';
                container.innerHTML += `
                    <div class="app-card">
                        <div class="app-info-box">
                            <img src="${foto}" class="app-icon-mini">
                            <div>
                                <b style="font-size: 16px;">${app.name}</b><br>
                                <small style="color: #888;">📦 APK Seguro</small>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <a href="${app.url}" class="btn-download" download="${app.name}.apk">BAIXAR</a>
                            ${adminAcesso ? `<button onclick="deletarApp('${app.id}')" style="background:none; border:none; color:#ff4444; margin-left:10px; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>`;
            });
        }
    }

    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === SENHA_MESTRA) {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            fetchApps();
        } else { alert("Senha Incorreta!"); }
    }

    async function salvarApp() {
        const name = document.getElementById('new-app-name').value;
        const icon = document.getElementById('new-app-icon').value;
        const rawUrl = document.getElementById('new-app-url').value;
        const status = document.getElementById('upload-status');

        if(!name || !rawUrl) return alert("Preencha Nome e Link!");
        status.innerText = "PROCESSANDO LINK...";

        // Converte o link do Drive antes de salvar
        const finalUrl = formatarLinkDrive(rawUrl);

        const { error } = await supabaseClient.from('apps').insert([{ 
            name: name, icon_url: icon, url: finalUrl, size: "Cloud" 
        }]);

        if(!error) {
            status.innerText = "✅ SALVO COM SUCESSO!";
            fetchApps();
            setTimeout(() => {
                fecharPainel();
                status.innerText = "";
            }, 800);
        } else { alert("Erro ao salvar no Banco!"); }
    }

    async function deletarApp(id) {
        if(prompt("Confirme a senha para excluir:") === SENHA_MESTRA) {
            await supabaseClient.from('apps').delete().eq('id', id);
            fetchApps();
        }
    }

    window.onload = () => {
        const savedUser = localStorage.getItem('appnet_user_v2');
        if(savedUser) carregarSistema(savedUser);
    }
</script>
</body>
</html>
