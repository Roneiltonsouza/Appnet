<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ea580c; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        .app-card { background: var(--card); border: 1px solid #334155; transition: 0.3s; }
        .app-card:hover { border-color: #ea580c; }
        .owner-only { display: none; } /* Esconde funções de dono por padrão */
    </style>
</head>
<body class="min-h-screen">

<div id="main-content" class="w-full h-screen flex flex-col items-stretch">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700 shadow-md">
        <div>
            <span class="font-bold text-orange-500 text-xl font-mono uppercase tracking-tighter">APPNET PRO</span>
            <p id="statusTag" class="text-[9px] text-gray-500 uppercase">Acesso Usuário</p>
        </div>
        
        <div class="flex gap-2">
            <button onclick="loginDono()" class="bg-gray-800 text-gray-400 px-3 py-2 rounded-lg text-[10px] font-bold border border-gray-700">DONO</button>
            
            <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" 
                    class="owner-only bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm shadow-lg active:scale-95 transition-all">
                + ADICIONAR APK
            </button>
        </div>
    </header>

    <input type="file" id="apkInput" accept=".apk" class="hidden">

    <div class="p-4 max-w-4xl mx-auto w-full flex-1 overflow-y-auto" id="appList">
        <div class="text-center mt-20 animate-pulse text-gray-500">Carregando aplicativos...</div>
    </div>
</div>

<script>
    // Configurações do Supabase
    const SUPABASE_URL = "https://oulmpkxhhhsvqnkdokxs.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_py0n_yBNWKUDsCBQiKTMsw_Qr3nXcd5"; 
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isOwner = false;

    // Inicia o app direto na lista
    window.onload = () => {
        renderList();
    };

    // Função para entrar como Dono
    function loginDono() {
        const senha = prompt("Digite a chave de acesso do Dono:");
        if (senha === "netchaveapi") {
            isOwner = true;
            document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
            document.getElementById('statusTag').innerText = "Modo Administrador";
            document.getElementById('statusTag').classList.replace('text-gray-500', 'text-orange-500');
            alert("Acesso concedido! Agora você pode adicionar e excluir APKs.");
            renderList(); // Recarrega para mostrar botões de excluir
        } else {
            alert("Senha incorreta!");
        }
    }

    // Upload de APK (Apenas Dono)
    document.getElementById('apkInput').onchange = async (e) => {
        if (!isOwner) return;
        
        const file = e.target.files[0];
        if (!file) return;
        
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        const filePath = `public_store/${Date.now()}_${file.name}`;
        const { error: uploadError } = await supabase.storage.from('apks').upload(filePath, file);

        if (!uploadError) {
            await supabase.from('arquivos').insert([
                { nome: file.name, tamanho: (file.size/1024/1024).toFixed(2) + " MB", usuario: "admin", path: filePath }
            ]);
            renderList();
        } else { 
            alert("Erro ao subir arquivo. Verifique se o Bucket 'apks' está como público."); 
        }
        
        btn.innerText = "+ ADICIONAR APK";
        btn.disabled = false;
    };

    // Renderiza a lista para todo mundo
    async function renderList() {
        // Busca todos os arquivos da loja (sem filtrar por usuário específico)
        const { data: arquivos, error } = await supabase
            .from('arquivos')
            .select('*')
            .order('created_at', { ascending: false });

        const list = document.getElementById('appList');
        list.innerHTML = "";

        if (arquivos && arquivos.length > 0) {
            arquivos.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card p-4 rounded-xl mb-3 flex justify-between items-center shadow-lg';
                
                // Botão de excluir só aparece se for Dono
                const deleteBtn = isOwner 
                    ? `<button onclick="excluir(${app.id}, '${app.path}')" class="bg-red-900/30 text-red-500 p-2 rounded-lg text-[10px] font-bold border border-red-500/20">EXCLUIR</button>` 
                    : '';

                card.innerHTML = `
                    <div class="truncate pr-4">
                        <div class="font-bold text-white text-sm truncate uppercase tracking-tight">${app.nome}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${app.tamanho}</div>
                    </div>
                    <div class="flex gap-3 items-center">
                        <button onclick="baixar('${app.path}', '${app.nome}')" 
                                class="bg-orange-600/10 text-orange-500 border border-orange-500/30 px-4 py-2 rounded-lg font-black text-xs uppercase transition-all active:bg-orange-600 active:text-white">
                            Download
                        </button>
                        ${deleteBtn}
                    </div>`;
                list.appendChild(card);
            });
        } else {
            list.innerHTML = `<div class="text-center mt-20 text-gray-600 text-sm italic">Nenhum APK disponível na loja no momento.</div>`;
        }
    }

    async function baixar(path, nome) {
        // Gera o link público do arquivo no Storage
        const { data } = await supabase.storage.from('apks').getPublicUrl(path);
        if (data?.publicUrl) {
            const a = document.createElement('a');
            a.href = data.publicUrl;
            a.download = nome;
            a.click();
        }
    }

    async function excluir(id, path) {
        if (!isOwner) return;
        if (!confirm("Dono, tem certeza que deseja apagar esse APK da loja?")) return;
        
        await supabase.from('arquivos').delete().eq('id', id);
        await supabase.storage.from('apks').remove([path]);
        renderList();
    }
</script>
</body>
</html>
