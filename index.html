<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ea580c; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .app-card { background: var(--card); border: 1px solid #334155; transition: 0.3s; }
        .app-card:hover { border-color: #ea580c; }
        /* Esconde por padrão o que é apenas do dono */
        .owner-controls { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

<div id="main-content" class="w-full h-screen flex flex-col items-stretch">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700 shadow-md">
        <div>
            <span class="font-bold text-orange-500 text-xl font-mono uppercase">APPNET PRO</span>
            <p id="statusTag" class="text-[9px] text-gray-500 uppercase tracking-widest">Acesso Público</p>
        </div>
        
        <div class="flex gap-2">
            <button onclick="loginDono()" id="btnDonoLogin" class="bg-gray-800 text-gray-400 px-3 py-2 rounded-lg text-[10px] font-bold border border-gray-700">DONO</button>
            
            <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" 
                    class="owner-controls bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm shadow-lg active:scale-95 transition-all">
                + ADICIONAR APK
            </button>
        </div>
    </header>

    <input type="file" id="apkInput" accept=".apk" class="hidden">

    <div class="p-4 max-w-4xl mx-auto w-full flex-1 overflow-y-auto" id="appList">
        </div>
</div>

<script>
    const SUPABASE_URL = "https://oulmpkxhhhsvqnkdokxs.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_py0n_yBNWKUDsCBQiKTMsw_Qr3nXcd5"; 
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isOwner = false;

    window.onload = () => {
        renderList();
    };

    // CORREÇÃO: Função de Login do Dono
    function loginDono() {
        const senha = prompt("🔒 Digite a senha do Dono:");
        
        if (senha === "netchaveapi") {
            isOwner = true;
            
            // Força a exibição dos botões de controle
            const style = document.createElement('style');
            style.innerHTML = '.owner-controls { display: block !important; } .owner-delete { display: inline-block !important; }';
            document.head.appendChild(style);

            document.getElementById('statusTag').innerText = "Modo Administrador";
            document.getElementById('statusTag').className = "text-[9px] text-orange-500 uppercase tracking-widest font-bold";
            document.getElementById('btnDonoLogin').style.display = 'none'; // Esconde o botão login após logado
            
            alert("Acesso liberado! Você agora pode adicionar e excluir arquivos.");
            renderList(); // Recarrega a lista para mostrar os botões de excluir nos cards
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    document.getElementById('apkInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !isOwner) return;
        
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        const filePath = `store/${Date.now()}_${file.name}`;
        const { error: uploadError } = await supabase.storage.from('apks').upload(filePath, file);

        if (!uploadError) {
            await supabase.from('arquivos').insert([
                { nome: file.name, tamanho: (file.size/1024/1024).toFixed(2) + " MB", usuario: "admin", path: filePath }
            ]);
            renderList();
        } else { 
            alert("Erro no upload! Verifique se o bucket 'apks' está como PUBLIC no Supabase."); 
        }
        
        btn.innerText = "+ ADICIONAR APK";
        btn.disabled = false;
    };

    async function renderList() {
        const { data: arquivos } = await supabase.from('arquivos').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('appList');
        list.innerHTML = "";

        if (arquivos && arquivos.length > 0) {
            arquivos.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card p-4 rounded-xl mb-3 flex justify-between items-center shadow-lg';
                
                // Botão de excluir com classe especial para controle de visibilidade
                const deleteHtml = `<button onclick="excluir(${app.id}, '${app.path}')" class="owner-controls owner-delete bg-red-900/20 text-red-500 px-2 py-1 rounded border border-red-500/30 text-[10px] ml-2">EXCLUIR</button>`;

                card.innerHTML = `
                    <div class="truncate flex-1">
                        <div class="font-bold text-white text-sm truncate uppercase">${app.nome}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${app.tamanho}</div>
                    </div>
                    <div class="flex items-center">
                        <button onclick="baixar('${app.path}', '${app.nome}')" 
                                class="bg-orange-600/10 text-orange-500 border border-orange-500/30 px-4 py-2 rounded-lg font-black text-xs uppercase hover:bg-orange-600 hover:text-white transition-all">
                            Download
                        </button>
                        ${deleteHtml}
                    </div>`;
                list.appendChild(card);
            });
        } else {
            list.innerHTML = `<div class="text-center mt-20 text-gray-600 text-sm italic">Nenhum APK disponível.</div>`;
        }
    }

    async function baixar(path, nome) {
        const { data } = await supabase.storage.from('apks').getPublicUrl(path);
        if (data?.publicUrl) {
            const a = document.createElement('a');
            a.href = data.publicUrl;
            a.download = nome;
            a.click();
        }
    }

    async function excluir(id, path) {
        if (!isOwner) return;
        if (!confirm("Confirmar exclusão definitiva?")) return;
        await supabase.from('arquivos').delete().eq('id', id);
        await supabase.storage.from('apks').remove([path]);
        renderList();
    }
</script>
</body>
</html>
