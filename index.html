<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* INTERFACE ORIGINAL APPNET PRO */
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* LOGIN ÚNICO */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; }
        
        /* BOTÃO SEMPRE VISÍVEL (Conforme sua preferência) */
        .admin-float-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 99; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }

        /* PAINEL DE APPS */
        .header { padding: 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        .app-grid { padding: 20px; display: grid; gap: 15px; }
        .app-card { background: var(--card); padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--primary); }
        
        /* ESTILOS GERAIS */
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 1001; display: none; overflow-y: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-user-circle" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Bem-vindo</h2>
        <input type="text" id="user-name" placeholder="Digite seu nome">
        <button onclick="fazerLogin()">Entrar</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg"></p>
    </div>

    <div class="app-grid" id="app-list">
        </div>

    <div class="admin-float-btn" onclick="abrirPainel()">
        <i class="fas fa-lock"></i>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div style="max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; position: relative;">
        <span onclick="fecharPainel()" style="position: absolute; right: 20px; top: 15px; cursor: pointer; color: var(--primary); font-size: 24px;">&times;</span>
        <h3>Painel Gerador</h3>
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha do Painel">
            <button onclick="acessarGerador()">Acessar</button>
        </div>
        
        <div id="upload-area" class="hidden">
            <input type="text" id="new-app-name" placeholder="Nome do App">
            <input type="file" id="new-app-file" accept=".apk">
            <button id="btn-upload" onclick="uploadNovoApp()">Subir para Nuvem</button>
            <div id="upload-status" style="margin-top: 10px; font-size: 0.8em; color: var(--primary);"></div>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE (SUAS CHAVES)
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // LOGIN ÚNICO
    function fazerLogin() {
        const nome = document.getElementById('user-name').value;
        if(nome.length < 3) return alert("Digite seu nome completo.");
        
        localStorage.setItem('appnet_user', nome);
        carregarSistema(nome);
    }

    function carregarSistema(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Olá, " + nome + "!";
        fetchApps();
    }

    // LISTAR APPS
    async function fetchApps() {
        const { data, error } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('app-list');
        container.innerHTML = "";

        if(data) {
            data.forEach(app => {
                container.innerHTML += `
                    <div class="app-card">
                        <div>
                            <b style="display:block;">${app.name}</b>
                            <small style="color: #888;">${app.size}</small>
                        </div>
                        <button onclick="window.open('${app.url}')" style="width: auto; padding: 8px 20px;">Baixar</button>
                        ${adminAcesso ? `<button onclick="deletarApp('${app.id}', '${app.file_path}')" style="width: auto; background: #ff4444; margin-left:5px;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                `;
            });
        }
    }

    // PAINEL ADMIN
    let adminAcesso = false;
    function abrirPainel() { document.getElementById('admin-modal').style.display = 'block'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === "Appnetrdgapi") {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            fetchApps();
        } else {
            alert("Senha incorreta!");
        }
    }

    // UPLOAD PARA NUVEM
    async function uploadNovoApp() {
        const name = document.getElementById('new-app-name').value;
        const file = document.getElementById('new-app-file').files[0];
        const status = document.getElementById('upload-status');

        if(!name || !file) return alert("Preencha tudo!");

        status.innerText = "Enviando APK...";
        const fileName = Date.now() + "_" + file.name;

        const { data: upData, error: upErr } = await supabaseClient.storage.from('apks').upload(fileName, file);
        if(upErr) return alert("Erro no Storage: " + upErr.message);

        const { data: urlData } = supabaseClient.storage.from('apks').getPublicUrl(fileName);
        
        const { error: dbErr } = await supabaseClient.from('apps').insert([
            { name: name, size: (file.size/(1024*1024)).toFixed(2) + " MB", url: urlData.publicUrl, file_path: fileName }
        ]);

        if(!dbErr) {
            status.innerText = "Sucesso!";
            fetchApps();
        }
    }

    async function deletarApp(id, path) {
        if(!confirm("Excluir app?")) return;
        await supabaseClient.from('apps').delete().eq('id', id);
        await supabaseClient.storage.from('apks').remove([path]);
        fetchApps();
    }

    // AUTO LOGIN
    window.onload = () => {
        const savedName = localStorage.getItem('appnet_user');
        if(savedName) carregarSistema(savedName);
    }
</script>

</body>
</html>
