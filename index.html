<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --text: #ffffff; 
            --shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; box-shadow: var(--shadow); }

        .header { padding: 30px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 10; }
        .app-grid { padding: 20px; display: grid; gap: 15px; }

        .app-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .app-info { display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid #334155; background: #0b0f1a; }

        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 99; border: none; box-shadow: 0 4px 20px rgba(0,255,136,0.5); }

        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-download { background: var(--primary); color: #000; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 13px; border: none; cursor: pointer; }

        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        .modal-content { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative; border: 1px solid var(--primary); }
        .close-modal { position: absolute; right: 20px; top: 15px; color: var(--primary); font-size: 30px; cursor: pointer; }
        
        .tab-btn { flex: 1; padding: 10px; background: #1a1f2e; color: #fff; border: 1px solid #334155; cursor: pointer; border-radius: 8px; }
        .tab-active { background: var(--primary) !important; color: #000 !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Appnet Pro</h2>
        <input type="text" id="user-name" placeholder="Seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg"></p>
    </div>
    <div class="app-grid" id="app-list"></div>
    <button class="admin-float-btn" onclick="abrirPainel()"><i class="fas fa-tools"></i></button>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharPainel()">&times;</span>
        <h3>Painel Administrativo</h3>
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha do Painel">
            <button class="btn-main" onclick="acessarGerador()">ACESSAR</button>
        </div>
        <div id="upload-area" class="hidden">
            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <button onclick="mudarTipo('apk')" id="t-apk" class="tab-btn tab-active">APK</button>
                <button onclick="mudarTipo('link')" id="t-link" class="tab-btn">LINK DRIVE</button>
            </div>
            <input type="text" id="new-app-name" placeholder="Nome do App">
            <input type="text" id="new-app-icon" placeholder="URL da Foto do App">
            <div id="input-apk"><input type="file" id="new-app-file" accept=".apk"></div>
            <div id="input-link" class="hidden"><input type="text" id="new-app-url" placeholder="Cole o link direto do Drive"></div>
            <button class="btn-main" onclick="processarUpload()">SALVAR NA NUVEM</button>
            <div id="upload-status" style="margin-top:15px; color:var(--primary); font-weight:bold; text-align:center;"></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let currentType = 'apk', adminAcesso = false;

    function fazerLogin() {
        const n = document.getElementById('user-name').value;
        if(n.length < 2) return;
        localStorage.setItem('appnet_user_v2', n);
        carregarSistema(n);
    }

    function carregarSistema(n) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Bem-vindo, " + n;
        fetchApps();
    }

    async function fetchApps() {
        const { data } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        if(data) data.forEach(app => {
            const icon = app.icon_url || "https://cdn-icons-png.flaticon.com/512/5738/5738031.png";
            list.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <img src="${icon}" class="app-icon">
                        <div><b>${app.name}</b><br><small>${app.size || 'APK'}</small></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button class="btn-download" onclick="window.open('${app.url}', '_blank')">BAIXAR APK</button>
                        ${adminAcesso ? `<button onclick="deletarApp('${app.id}', '${app.file_path}')" style="background:none; border:none; color:#ff4444; font-size:18px; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                </div>`;
        });
    }

    async function deletarApp(id, path) {
        if(!confirm("Excluir este APK?")) return;
        const { error } = await supabaseClient.from('apps').delete().eq('id', id);
        if(!error) {
            if(path && path !== "null") await supabaseClient.storage.from('apks').remove([path]);
            alert("Excluído!"); fetchApps();
        } else { alert("Erro: " + error.message); }
    }

    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }
    function mudarTipo(t) {
        currentType = t;
        document.getElementById('t-apk').className = t==='apk'?'tab-btn tab-active':'tab-btn';
        document.getElementById('t-link').className = t==='link'?'tab-btn tab-active':'tab-btn';
        document.getElementById('input-apk').className = t==='link'?'hidden':'';
        document.getElementById('input-link').className = t==='apk'?'hidden':'';
    }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === "Appnetrdgapi") {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            fetchApps();
        }
    }

    async function processarUpload() {
        const name = document.getElementById('new-app-name').value;
        const icon = document.getElementById('new-app-icon').value;
        const status = document.getElementById('upload-status');
        if(!name) return alert("Nome vazio!");
        status.innerText = "SALVANDO...";

        let urlFinal = "", pathFinal = "", sizeFinal = "APK";

        if(currentType === 'apk') {
            const file = document.getElementById('new-app-file').files[0];
            const fileName = Date.now() + "_" + file.name;
            await supabaseClient.storage.from('apks').upload(fileName, file);
            const { data: pUrl } = supabaseClient.storage.from('apks').getPublicUrl(fileName);
            urlFinal = pUrl.publicUrl; pathFinal = fileName; sizeFinal = (file.size/(1024*1024)).toFixed(1) + " MB";
        } else {
            urlFinal = document.getElementById('new-app-url').value;
        }

        await supabaseClient.from('apps').insert([{ name, url: urlFinal, size: sizeFinal, file_path: pathFinal, icon_url: icon }]);
        status.innerText = "PRONTO!"; fetchApps(); setTimeout(fecharPainel, 1000);
    }

    window.onload = () => { if(localStorage.getItem('appnet_user_v2')) carregarSistema(localStorage.getItem('appnet_user_v2')); }
</script>
</body>
</html>
