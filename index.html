<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ea580c; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .app-card { background: var(--card); border: 1px solid #334155; transition: 0.3s; }
        #auth-screen { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 50; align-items: center; justify-content: center; }
        .owner-controls { display: none; }
        .error-msg { display: none; color: #ef4444; font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen">

<div id="auth-screen">
    <div class="w-full max-w-sm p-6 bg-gray-800 rounded-xl shadow-2xl border border-gray-700 mx-4 text-center">
        <h2 class="text-orange-500 font-bold mb-4 uppercase tracking-wider">Acesso Restrito</h2>
        
        <input type="password" id="adminPass" placeholder="Digite a Senha Única" 
               class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 focus:border-orange-500 outline-none mb-2 text-white text-center">
        
        <div id="msgErro" class="error-msg mb-4">
            ⚠️ ACESSO NEGADO!<br>Entre em contato com o suporte.
        </div>

        <button onclick="validarDono()" class="w-full py-4 bg-orange-600 hover:bg-orange-500 transition-all rounded-lg font-black text-white shadow-xl mb-4">
            ENTRAR AGORA
        </button>

        <div class="flex flex-col gap-4">
            <a href="https://wa.me/5588988088578" target="_blank" class="text-green-500 font-bold text-sm underline">
                Falar com Suporte WhatsApp
            </a>
            <button onclick="fecharLogin()" class="text-gray-500 text-xs">Voltar para a Loja</button>
        </div>
    </div>
</div>

<div id="main-content" class="w-full h-screen flex flex-col items-stretch">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700 shadow-md">
        <div class="flex flex-col">
            <span class="font-bold text-orange-500 text-xl font-mono uppercase">APPNET PRO</span>
            <p id="statusTag" class="text-[9px] text-gray-500 uppercase tracking-widest">Acesso Público</p>
        </div>
        
        <div class="flex gap-2">
            <a href="https://wa.me/5588988088578" target="_blank" class="bg-green-600/20 text-green-500 border border-green-500/30 px-3 py-2 rounded-lg text-[10px] font-bold flex items-center">
                WHATSAPP
            </a>

            <button onclick="abrirLogin()" id="btnDono" class="bg-gray-800 text-gray-400 px-3 py-2 rounded-lg text-[10px] font-bold border border-gray-700">DONO</button>
            
            <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" 
                    class="owner-controls bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm shadow-lg">
                + ADD APK
            </button>
        </div>
    </header>

    <input type="file" id="apkInput" accept=".apk" class="hidden">

    <div class="p-4 max-w-4xl mx-auto w-full flex-1 overflow-y-auto" id="appList">
        </div>
</div>

<script>
    const SUPABASE_URL = "https://oulmpkxhhhsvqnkdokxs.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_py0n_yBNWKUDsCBQiKTMsw_Qr3nXcd5"; 
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isOwner = false;

    window.onload = () => { renderList(); };

    function abrirLogin() { 
        document.getElementById('auth-screen').style.display = 'flex'; 
        document.getElementById('msgErro').style.display = 'none';
    }
    
    function fecharLogin() { document.getElementById('auth-screen').style.display = 'none'; }

    // VALIDAÇÃO COM ACESSO ÚNICO
    function validarDono() {
        const pass = document.getElementById('adminPass').value;
        const msgErro = document.getElementById('msgErro');

        if (pass === "netchaveapi") {
            isOwner = true;
            fecharLogin();
            document.getElementById('btnDono').style.display = 'none';
            document.getElementById('statusTag').innerText = "MODO DONO ATIVO";
            document.getElementById('statusTag').className = "text-[9px] text-orange-500 font-bold uppercase";
            
            document.querySelectorAll('.owner-controls').forEach(el => el.style.display = 'block');
            renderList();
        } else {
            // Se errar a senha, mostra o aviso de negado
            msgErro.style.display = 'block';
            document.getElementById('adminPass').value = "";
        }
    }

    document.getElementById('apkInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !isOwner) return;
        
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "SUBINDO...";
        btn.disabled = true;

        const filePath = `store/${Date.now()}_${file.name}`;
        const { error: uploadError } = await supabase.storage.from('apks').upload(filePath, file);

        if (!uploadError) {
            await supabase.from('arquivos').insert([
                { nome: file.name, tamanho: (file.size/1024/1024).toFixed(2) + " MB", usuario: "admin", path: filePath }
            ]);
            renderList();
        } else { alert("Erro ao subir arquivo."); }
        
        btn.innerText = "+ ADD APK";
        btn.disabled = false;
    };

    async function renderList() {
        const { data: arquivos } = await supabase.from('arquivos').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('appList');
        list.innerHTML = "";

        if (arquivos && arquivos.length > 0) {
            arquivos.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card p-4 rounded-xl mb-3 flex justify-between items-center shadow-lg';
                
                const deleteBtn = isOwner ? `<button onclick="excluir(${app.id}, '${app.path}')" class="text-red-500 text-[10px] ml-4 border border-red-500/20 p-1 px-2 rounded">EXCLUIR</button>` : '';

                card.innerHTML = `
                    <div class="truncate flex-1">
                        <div class="font-bold text-white text-sm truncate uppercase tracking-tight">${app.nome}</div>
                        <div class="text-[9px] text-gray-500">${app.tamanho}</div>
                    </div>
                    <div class="flex items-center">
                        <button onclick="baixar('${app.path}', '${app.nome}')" 
                                class="bg-orange-600/10 text-orange-500 border border-orange-500/30 px-5 py-2 rounded-lg font-black text-xs uppercase transition-all active:scale-95">
                            BAIXAR
                        </button>
                        ${deleteBtn}
                    </div>`;
                list.appendChild(card);
            });
        } else {
            list.innerHTML = `<div class="text-center mt-20 text-gray-700 text-sm">Nenhum APK disponível.</div>`;
        }
    }

    async function baixar(path, nome) {
        const { data } = await supabase.storage.from('apks').getPublicUrl(path);
        if (data?.publicUrl) {
            const a = document.createElement('a');
            a.href = data.publicUrl;
            a.download = nome;
            a.click();
        }
    }

    async function excluir(id, path) {
        if (!confirm("Remover APK da loja?")) return;
        await supabase.from('arquivos').delete().eq('id', id);
        await supabase.storage.from('apks').remove([path]);
        renderList();
    }
</script>
</body>
</html>
