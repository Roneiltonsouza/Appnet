<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --text: #ffffff; 
            --shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; box-shadow: var(--shadow); }

        /* HEADER */
        .header { padding: 25px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 10; }
        .header h1 { margin: 0; font-size: 24px; font-weight: bold; }

        /* LISTAGEM */
        .app-grid { padding: 20px; display: grid; gap: 12px; }
        .app-card { 
            background: var(--card); 
            padding: 12px 15px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .app-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .app-icon { 
            width: 50px; 
            height: 50px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 1px solid #334155; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .app-details { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .app-details b { font-size: 16px; display: block; overflow: hidden; text-overflow: ellipsis; }

        /* BOTÃO DOWNLOAD */
        .btn-download { 
            background: var(--primary); 
            color: #000; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 11px; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        /* MODAIS */
        #zoom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        #zoom-img { max-width: 90%; max-height: 80%; border-radius: 15px; border: 2px solid var(--primary); }
        
        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 99; border: none; box-shadow: 0 4px 20px rgba(0,255,136,0.5); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        .modal-content { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative; border: 1px solid var(--primary); }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .hidden { display: none !important; }
        
        .tab-btn { flex: 1; padding: 12px; background: #1a1f2e; color: #fff; border: 1px solid #334155; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .tab-active { background: var(--primary) !important; color: #000 !important; }
    </style>
</head>
<body>

<div id="zoom-modal" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Appnet Pro</h2>
        <input type="text" id="user-name" placeholder="Digite seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <small id="welcome-msg" style="opacity: 0.7;"></small>
    </div>
    <div class="app-grid" id="app-list"></div>
    <button class="admin-float-btn" onclick="abrirPainel()"><i class="fas fa-tools"></i></button>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; color:var(--primary); cursor:pointer; font-size:30px;" onclick="fecharPainel()">&times;</span>
        <h3 style="text-align: center;">Gerenciador</h3>
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha Administrativa">
            <button class="btn-main" onclick="acessarGerador()">LIBERAR</button>
        </div>
        <div id="upload-area" class="hidden">
            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <button onclick="mudarTipo('apk')" id="t-apk" class="tab-btn tab-active">APK</button>
                <button onclick="mudarTipo('link')" id="t-link" class="tab-btn">LINK DRIVE</button>
            </div>
            <input type="text" id="new-app-name" placeholder="Nome do App">
            <input type="text" id="new-app-icon" placeholder="URL da Imagem">
            <div id="input-apk"><input type="file" id="new-app-file" accept=".apk"></div>
            <div id="input-link" class="hidden"><input type="text" id="new-app-url" placeholder="Link do Drive"></div>
            <button class="btn-main" onclick="processarUpload()">SALVAR</button>
            <div id="upload-status" style="margin-top:15px; color:var(--primary); text-align:center;"></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const SENHA_MESTRA = "Appnetrdgapi";
    let currentType = 'apk', adminAcesso = false;

    function fazerLogin() {
        const n = document.getElementById('user-name').value;
        if(n.length < 2) return alert("Nome inválido");
        localStorage.setItem('appnet_user_v2', n);
        carregarSistema(n);
    }

    function carregarSistema(n) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "CONECTADO: " + n.toUpperCase();
        fetchApps();
    }

    function verFoto(url) {
        document.getElementById('zoom-img').src = url;
        document.getElementById('zoom-modal').style.display = 'flex';
    }

    async function fetchApps() {
        const { data } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        
        if(data) data.forEach(app => {
            list.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <img src="${app.icon_url}" class="app-icon" onclick="verFoto('${app.icon_url}')">
                        <div class="app-details">
                            <b>${app.name}</b>
                            <small style="color:#888; font-size:11px;">${app.size || 'APK'}</small>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button class="btn-download" onclick="window.open('${app.url}', '_blank')">BAIXAR APK</button>
                        ${adminAcesso ? `<button onclick="deletarAppComSenha('${app.id}', '${app.file_path}')" style="background:none; border:none; color:#ff4444; font-size:18px; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                </div>`;
        });
    }

    async function deletarAppComSenha(id, path) {
        if (prompt("⚠️ Senha para excluir:") === SENHA_MESTRA) {
            const { error } = await supabaseClient.from('apps').delete().eq('id', id);
            if(!error) {
                if(path && path !== "null") await supabaseClient.storage.from('apks').remove([path]);
                alert("✅ Removido!"); fetchApps();
            }
        }
    }

    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }
    
    function acessarGerador() {
        if(document.getElementById('api-pass').value === SENHA_MESTRA) {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            fetchApps();
        }
    }

    function mudarTipo(t) {
        currentType = t;
        document.getElementById('t-apk').className = t==='apk'?'tab-btn tab-active':'tab-btn';
        document.getElementById('t-link').className = t==='link'?'tab-btn tab-active':'tab-btn';
        document.getElementById('input-apk').className = t==='link'?'hidden':'';
        document.getElementById('input-link').className = t==='apk'?'hidden':'';
    }

    async function processarUpload() {
        const name = document.getElementById('new-app-name').value;
        const icon = document.getElementById('new-app-icon').value;
        const status = document.getElementById('upload-status');
        if(!name) return alert("Nome obrigatório");
        status.innerText = "⏳ SALVANDO...";

        let urlFinal = "", pathFinal = "", sizeFinal = "LINK DRIVE";

        if(currentType === 'apk') {
            const file = document.getElementById('new-app-file').files[0];
            if(!file) return alert("Selecione o APK");
            const fileName = Date.now() + "_" + file.name;
            await supabaseClient.storage.from('apks').upload(fileName, file);
            const { data: pUrl } = supabaseClient.storage.from('apks').getPublicUrl(fileName);
            urlFinal = pUrl.publicUrl; pathFinal = fileName; sizeFinal = (file.size/(1024*1024)).toFixed(1) + " MB";
        } else {
            urlFinal = document.getElementById('new-app-url').value;
        }

        await supabaseClient.from('apps').insert([{ name, url: urlFinal, size: sizeFinal, file_path: pathFinal, icon_url: icon }]);
        status.innerText = "✅ SUCESSO!"; fetchApps(); setTimeout(fecharPainel, 800);
    }

    window.onload = () => { if(localStorage.getItem('appnet_user_v2')) carregarSistema(localStorage.getItem('appnet_user_v2')); }
</script>
</body>
</html>
