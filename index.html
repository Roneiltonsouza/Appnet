<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Telas */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        
        /* Botão Flutuante */
        .admin-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 99; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        /* Layout Principal */
        .header { padding: 40px 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        .app-grid { padding: 20px; display: grid; gap: 15px; max-width: 600px; margin: 0 auto; }
        
        /* Cards */
        .app-card { background: var(--card); padding: 18px; border-radius: 15px; border-left: 5px solid var(--primary); display: flex; flex-direction: column; }
        .card-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        
        /* Barra de Progresso */
        .progress-wrapper { width: 100%; margin-top: 15px; display: none; }
        .progress-container { width: 100%; background: #0b0f1a; border-radius: 10px; height: 8px; overflow: hidden; border: 1px solid #334155; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 11px; color: var(--primary); margin-top: 5px; text-align: right; font-weight: bold; }

        /* Elementos UI */
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }
        .btn-download { background: var(--primary); color: #000; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .btn-download:disabled { background: #334155; color: #aaa; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 1001; display: none; align-items: center; justify-content: center; }
        
        /* Visualizador de Imagem */
        #img-viewer { z-index: 1002; flex-direction: column; }
        .full-img { max-width: 90%; max-height: 80vh; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(0,255,136,0.3); }

        .app-icon-mini { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #222; cursor: zoom-in; transition: 0.2s; }
        .app-icon-mini:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-cloud-upload-alt" style="font-size: 60px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2 style="margin-bottom: 20px;">Appnet Pro</h2>
        <input type="text" id="user-name" placeholder="Digite seu Nome">
        <button class="btn-main" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h1>Appnet <span style="color: var(--primary);">Pro</span></h1>
        <p id="welcome-msg" style="margin:0; opacity: 0.8; font-size: 14px;"></p>
    </div>
    
    <div class="app-grid" id="app-list"></div>

    <button class="admin-float-btn" onclick="abrirPainel()">
        <i class="fas fa-tools"></i>
    </button>
</div>

<div id="admin-modal" class="modal">
    <div style="width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; position: relative; border: 1px solid var(--primary);">
        <span style="position: absolute; right: 20px; top: 15px; color: #ff4444; font-size: 25px; cursor: pointer;" onclick="fecharPainel()">&times;</span>
        <h3 style="color: var(--primary); margin-top: 0;">Gerenciar APKs</h3>
        
        <div id="login-api">
            <input type="password" id="api-pass" placeholder="Senha Administrativa">
            <button class="btn-main" onclick="acessarGerador()">AUTENTICAR</button>
        </div>

        <div id="upload-area" class="hidden">
            <input type="text" id="new-app-name" placeholder="Nome do Aplicativo">
            <input type="text" id="new-app-icon" placeholder="URL do Ícone (PNG/JPG)">
            <input type="text" id="new-app-url" placeholder="Link Direto do APK">
            <button class="btn-main" onclick="salvarApp()">CADASTRAR APK</button>
            <div id="upload-status" style="margin-top: 15px; text-align: center; font-size: 13px;"></div>
        </div>
    </div>
</div>

<div id="img-viewer" class="modal" onclick="fecharImagem()">
    <img id="img-full-res" class="full-img" src="">
    <p style="color: var(--primary); margin-top: 15px; font-weight: bold;">Tamanho Original</p>
    <small style="color: #ccc;">Clique fora para fechar</small>
</div>

<script>
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co";
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const SENHA_MESTRA = "Appnetrdgapi";
    let adminAcesso = false;

    function fazerLogin() {
        const nome = document.getElementById('user-name').value;
        if(nome.trim().length < 3) return alert("Por favor, digite seu nome completo.");
        localStorage.setItem('appnet_user_2026', nome);
        carregarSistema(nome);
    }

    function carregarSistema(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "BEM-VINDO, " + nome.toUpperCase();
        listarApps();
    }

    // Função para ver tamanho original
    function verImagemOriginal(url) {
        const viewer = document.getElementById('img-viewer');
        const img = document.getElementById('img-full-res');
        img.src = url;
        viewer.style.display = 'flex';
    }

    function fecharImagem() {
        document.getElementById('img-viewer').style.display = 'none';
    }

    async function listarApps() {
        const { data, error } = await supabaseClient.from('apps').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        
        if(data) {
            data.forEach((app, index) => {
                const iconPath = app.icon_url || 'https://cdn-icons-png.flaticon.com/512/5738/5738031.png';
                list.innerHTML += `
                <div class="app-card">
                    <div class="card-top">
                        <div style="display:flex; align-items:center;">
                            <img src="${iconPath}" 
                                 class="app-icon-mini" 
                                 onclick="verImagemOriginal('${iconPath}')" 
                                 title="Ver tamanho original">
                            <div>
                                <b style="font-size: 16px;">${app.name}</b><br>
                                <small style="color:var(--primary); font-size: 11px;"><i class="fas fa-check-circle"></i> Verificado</small>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <button onclick="baixarArquivo('${app.url}', '${app.name}', this, ${index})" class="btn-download">BAIXAR</button>
                            ${adminAcesso ? `<button onclick="remover('${app.id}')" style="background:none; border:none; color:#ff4444; margin-left:10px;"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="progress-wrapper" id="wrapper-${index}">
                        <div class="progress-container"><div id="bar-${index}" class="progress-bar"></div></div>
                        <div id="txt-${index}" class="progress-text">0%</div>
                    </div>
                </div>`;
            });
        }
    }

    async function baixarArquivo(url, nomeApp, btn, idx) {
        const wrapper = document.getElementById(`wrapper-${idx}`);
        const bar = document.getElementById(`bar-${idx}`);
        const txt = document.getElementById(`txt-${idx}`);

        try {
            btn.disabled = true;
            btn.innerText = "AGUARDE...";
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');

            if (!contentLength) {
                window.open(url, '_blank');
                btn.disabled = false;
                btn.innerText = "BAIXAR";
                return;
            }

            wrapper.style.display = 'block';
            let receivedLength = 0;
            let chunks = []; 

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                let percent = Math.round((receivedLength / contentLength) * 100);
                bar.style.width = percent + '%';
                txt.innerText = percent + '% COMPLETO';
            }

            const blob = new Blob(chunks);
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = nomeApp + ".apk";
            document.body.appendChild(a);
            a.click();
            txt.innerText = "DOWNLOAD CONCLUÍDO!";
            setTimeout(() => { 
                wrapper.style.display = 'none'; 
                btn.disabled = false;
                btn.innerText = "BAIXAR";
            }, 3000);
        } catch (e) {
            window.open(url, '_blank');
            btn.disabled = false;
            btn.innerText = "BAIXAR";
        }
    }

    function abrirPainel() { document.getElementById('admin-modal').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('admin-modal').style.display = 'none'; }

    function acessarGerador() {
        if(document.getElementById('api-pass').value === SENHA_MESTRA) {
            adminAcesso = true;
            document.getElementById('login-api').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('hidden');
            listarApps();
        } else { alert("Acesso Negado!"); }
    }

    async function salvarApp() {
        const nome = document.getElementById('new-app-name').value;
        const icon = document.getElementById('new-app-icon').value;
        const link = document.getElementById('new-app-url').value;
        const status = document.getElementById('upload-status');
        if(!nome || !link) return alert("Preencha Nome e Link!");
        status.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Salvando...";
        const { error } = await supabaseClient.from('apps').insert([{ name: nome, icon_url: icon, url: link }]);
        if(!error) {
            status.innerHTML = "<span style='color:var(--primary)'>✅ CADASTRADO!</span>";
            listarApps();
            setTimeout(fecharPainel, 1500);
        }
    }

    async function remover(id) {
        if(confirm("Deseja remover este APK?")) {
            await supabaseClient.from('apps').delete().eq('id', id);
            listarApps();
        }
    }

    window.onload = () => {
        const user = localStorage.getItem('appnet_user_2026');
        if(user) carregarSistema(user);
    }
</script>
</body>
</html>
