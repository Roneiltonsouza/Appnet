<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro - Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #0f172a; color: white; border: 1px solid #475569; }
        button { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }
        button.delete { background: #ef4444; color: white; margin-top: 10px; }
        .app-item { background: #334155; padding: 15px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        #status { text-align: center; color: var(--primary); font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Appnet Pro - Gerenciador</h2>
    
    <div class="card">
        <h3>Subir Novo APK</h3>
        <input type="text" id="appName" placeholder="Nome do Aplicativo">
        <input type="file" id="appFile" accept=".apk">
        <button onclick="uploadApp()">Enviar para Nuvem</button>
        <div id="status"></div>
    </div>

    <div id="appList">
        <h3>Meus Aplicativos</h3>
        </div>
</div>

<script>
    // Configurações extraídas do seu painel Supabase
    const SB_URL = "https://xahrzppgkcinpvwvednn.supabase.co"; //
    const SB_KEY = "sb_publishable_vRzozgRpPpBcDHduo9jYCQ_VE2onFyJ"; //
    
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    // 1. FUNÇÃO PARA LISTAR APPS
    async function fetchApps() {
        const { data, error } = await supabase.from('apps').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const list = document.getElementById('appList');
        list.innerHTML = '<h3>Meus Aplicativos</h3>';
        
        data.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `
                <div>
                    <strong>${app.name}</strong><br>
                    <small>${app.size}</small>
                </div>
                <div>
                    <a href="${app.url}" target="_blank" style="color: #00ff88; text-decoration: none; margin-right: 10px;">Baixar</a>
                    <button class="delete" onclick="deleteApp('${app.id}', '${app.file_path}')" style="width: auto; padding: 5px 10px;">X</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // 2. FUNÇÃO PARA UPLOAD
    async function uploadApp() {
        const name = document.getElementById('appName').value;
        const file = document.getElementById('appFile').files[0];
        const status = document.getElementById('status');

        if (!name || !file) return alert("Preencha o nome e selecione o arquivo!");

        status.innerText = "Subindo arquivo... aguarde.";

        const fileName = `${Date.now()}_${file.name}`;
        const fileSize = (file.size / (1024 * 1024)).toFixed(2) + " MB";

        // Upload para o Storage (bucket: apks)
        const { data: uploadData, error: uploadError } = await supabase.storage
            .from('apks')
            .upload(fileName, file);

        if (uploadError) {
            status.innerText = "Erro no upload: " + uploadError.message;
            return;
        }

        // Pegar URL pública do arquivo
        const { data: urlData } = supabase.storage.from('apks').getPublicUrl(fileName);
        const publicUrl = urlData.publicUrl;

        // Salvar no Banco de Dados (tabela: apps)
        const { error: dbError } = await supabase.from('apps').insert([
            { name: name, size: fileSize, url: publicUrl, file_path: fileName }
        ]);

        if (dbError) {
            status.innerText = "Erro ao salvar dados: " + dbError.message;
        } else {
            status.innerText = "Concluído com sucesso!";
            document.getElementById('appName').value = "";
            fetchApps();
        }
    }

    // 3. FUNÇÃO PARA DELETAR
    async function deleteApp(id, filePath) {
        if (!confirm("Tem certeza que deseja excluir?")) return;

        // Deleta do banco
        await supabase.from('apps').delete().eq('id', id);
        // Deleta o arquivo do storage
        await supabase.storage.from('apks').remove([filePath]);

        fetchApps();
    }

    // Iniciar carregando a lista
    fetchApps();
</script>

</body>
</html>
