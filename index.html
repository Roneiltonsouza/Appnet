<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ea580c; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .app-card { background: var(--card); border: 1px solid #334155; transition: 0.3s; }
        /* Tela de Login Único */
        #auth-screen { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); z-index: 100; 
            align-items: center; justify-content: center; 
        }
        .owner-only { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

<div id="auth-screen">
    <div class="w-full max-w-sm p-6 bg-gray-800 rounded-xl shadow-2xl border border-gray-700 mx-4 text-center">
        <h2 class="text-orange-500 font-bold mb-6 uppercase tracking-widest text-xl">Acesso Restrito</h2>
        
        <input type="password" id="adminPass" placeholder="Digite a senha netchaveapi" 
               class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 focus:border-orange-500 outline-none mb-2 text-white text-center text-lg">
        
        <p id="msgErro" class="hidden text-red-500 text-xs font-bold mb-4 uppercase">
            ⚠️ Acesso Negado!<br>Entre em contato com o suporte.
        </p>

        <button onclick="validarDono()" class="w-full py-4 bg-orange-600 hover:bg-orange-500 rounded-lg font-black text-white shadow-xl mb-4">
            ENTRAR NO SISTEMA
        </button>

        <div class="flex flex-col gap-3">
            <a href="https://wa.me/5588988088578" target="_blank" class="text-green-500 font-bold text-sm">Suporte WhatsApp</a>
            <button onclick="fecharLogin()" class="text-gray-500 text-xs uppercase">Voltar à Loja</button>
        </div>
    </div>
</div>

<div id="main-content" class="w-full h-screen flex flex-col">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700 shadow-md">
        <div class="flex flex-col">
            <span class="font-bold text-orange-500 text-xl font-mono uppercase tracking-tighter">APPNET PRO</span>
            <p id="statusTag" class="text-[9px] text-gray-500 uppercase tracking-widest">Acesso Público</p>
        </div>
        
        <div class="flex gap-2">
            <a href="https://wa.me/5588988088578" target="_blank" class="bg-green-600/20 text-green-500 border border-green-500/30 px-3 py-2 rounded-lg text-[10px] font-bold">WHATSAPP</a>
            
            <button onclick="abrirLogin()" id="btnDonoLogin" class="bg-gray-800 text-gray-400 px-3 py-2 rounded-lg text-[10px] font-bold border border-gray-700">ABA DONO</button>
            
            <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" 
                    class="owner-only bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm shadow-lg active:scale-95 transition-all">
                + ADD APK / ZIP
            </button>
        </div>
    </header>

    <input type="file" id="apkInput" accept=".apk,.zip" class="hidden">

    <div class="p-4 max-w-4xl mx-auto w-full flex-1 overflow-y-auto" id="appList">
        <div class="text-center mt-20 text-gray-600">Carregando lista...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://oulmpkxhhhsvqnkdokxs.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_py0n_yBNWKUDsCBQiKTMsw_Qr3nXcd5"; 
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isOwner = false;

    window.onload = () => { renderList(); };

    // Controle da Tela de Login Único
    function abrirLogin() { 
        document.getElementById('auth-screen').style.display = 'flex'; 
        document.getElementById('msgErro').classList.add('hidden');
    }
    
    function fecharLogin() { document.getElementById('auth-screen').style.display = 'none'; }

    // VALIDAÇÃO DA SENHA ÚNICA
    function validarDono() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "netchaveapi") {
            isOwner = true;
            fecharLogin();
            document.getElementById('btnDonoLogin').style.display = 'none';
            document.getElementById('statusTag').innerText = "MODO ADMINISTRADOR";
            document.getElementById('statusTag').classList.replace('text-gray-500', 'text-orange-500');
            
            // Exibe os controles secretos
            document.querySelectorAll('.owner-only').forEach(el => {
                el.style.setProperty('display', 'block', 'important');
            });
            renderList();
        } else {
            document.getElementById('msgErro').classList.remove('hidden');
            document.getElementById('adminPass').value = "";
        }
    }

    // Upload e Conversão Lógica
    document.getElementById('apkInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !isOwner) return;
        
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "CONVERTENDO/SUBINDO...";
        btn.disabled = true;

        const filePath = `store/${Date.now()}_${file.name}`;
        const { error: uploadError } = await supabase.storage.from('apks').upload(filePath, file);

        if (!uploadError) {
            await supabase.from('arquivos').insert([
                { nome: file.name, tamanho: (file.size/1024/1024).toFixed(2) + " MB", usuario: "admin", path: filePath }
            ]);
            renderList();
        } else { alert("Erro no servidor!"); }
        
        btn.innerText = "+ ADD APK / ZIP";
        btn.disabled = false;
    };

    async function renderList() {
        const { data: arquivos } = await supabase.from('arquivos').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('appList');
        list.innerHTML = "";

        if (arquivos && arquivos.length > 0) {
            arquivos.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card p-4 rounded-xl mb-3 flex justify-between items-center shadow-lg';
                
                // Botão excluir só aparece se for dono
                const deleteBtn = isOwner ? `<button onclick="excluir(${app.id}, '${app.path}')" class="bg-red-900/20 text-red-500 px-2 py-1 rounded text-[9px] border border-red-500/20 ml-2">APAGAR</button>` : '';

                card.innerHTML = `
                    <div class="truncate flex-1 pr-2">
                        <div class="font-bold text-white text-sm truncate uppercase tracking-tight">${app.nome}</div>
                        <div class="text-[9px] text-gray-500 italic">${app.tamanho}</div>
                    </div>
                    <div class="flex items-center">
                        <button onclick="baixar('${app.path}', '${app.nome}')" 
                                class="bg-orange-600 text-white px-5 py-2 rounded-lg font-black text-xs shadow-lg active:scale-95 transition-all">
                            INSTALAR
                        </button>
                        ${deleteBtn}
                    </div>`;
                list.appendChild(card);
            });
        } else {
            list.innerHTML = `<p class="text-center mt-10 text-gray-600">Loja vazia.</p>`;
        }
    }

    async function baixar(path, nome) {
        const { data } = await supabase.storage.from('apks').getPublicUrl(path);
        if (data?.publicUrl) {
            const a = document.createElement('a');
            a.href = data.publicUrl;
            // O navegador trata o download e o usuário instala o APK extraído ou ZIP direto
            a.download = nome;
            a.click();
        }
    }

    async function excluir(id, path) {
        if (!confirm("Dono, apagar este arquivo?")) return;
        await supabase.from('arquivos').delete().eq('id', id);
        await supabase.storage.from('apks').remove([path]);
        renderList();
    }
</script>
</body>
</html>
