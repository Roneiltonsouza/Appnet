<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appnet Pro | Cloud VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #ff4500; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .app-card { background: var(--card); border: 1px solid #232a3d; border-radius: 18px; }
        #geradorMenu { display: none; position: fixed; inset: 0; background: #0b0f1a; z-index: 100; }
        .btn-whatsapp { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 30px; z-index: 90; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

<a href="https://wa.me/5588992144865" target="_blank" class="btn-whatsapp"><i class="fab fa-whatsapp text-white"></i></a>

<div id="geradorMenu" class="flex flex-col">
    <header class="p-4 bg-gray-900 border-b border-orange-600 flex justify-between items-center">
        <span class="font-black text-orange-600 uppercase">Painel Appnet</span>
        <button onclick="document.getElementById('geradorMenu').style.display='none'" class="text-red-500 font-bold">FECHAR</button>
    </header>
    <div class="p-6 flex flex-col items-center">
        <button onclick="document.getElementById('apkInput').click()" id="uploadBtn" class="w-full max-w-xs bg-orange-600 p-5 rounded-2xl font-black shadow-lg mb-8 uppercase text-white">
            <i class="fas fa-file-archive mr-2"></i> ADICIONAR APK (ZIP MODE)
        </button>
        <input type="file" id="apkInput" accept=".apk" class="hidden">
        <div id="adminList" class="w-full max-w-2xl"></div>
    </div>
</div>

<header class="p-5 flex justify-between items-center border-b border-white/5 bg-gray-900/40 sticky top-0 z-50">
    <div class="flex flex-col">
        <span class="font-black text-orange-600 text-2xl uppercase">APPNET PRO</span>
        <span class="text-[9px] text-gray-500 font-bold uppercase tracking-[4px]">Cloud Store</span>
    </div>
    <button onclick="solicitarSenha()" class="bg-white/5 p-3 rounded-xl border border-white/10"><i class="fas fa-cog text-gray-400"></i></button>
</header>

<main id="appList" class="p-4 flex-1 max-w-4xl mx-auto w-full grid grid-cols-1 gap-4">
    <div class="text-center mt-20 text-gray-600 font-bold uppercase text-xs">Sincronizando Nuvem...</div>
</main>

<script>
    const cloudName = "daiq3g0sk"; 
    const uploadPreset = "ml_default"; 

    const firebaseConfig = {
        apiKey: "AIzaLXKFaZONAeHabdqOV3b0VE6ISpPUMvLkNKa",
        authDomain: "appnet-pro.firebaseapp.com",
        projectId: "appnet-pro",
        storageBucket: "appnet-pro.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function solicitarSenha() {
        if (prompt("Senha Master:") === "Appnetrdgapi") document.getElementById('geradorMenu').style.display = 'flex';
    }

    document.getElementById("apkInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const btn = document.getElementById("uploadBtn");
        btn.innerHTML = "CONVERTENDO E SUBINDO...";
        btn.disabled = true;

        // "Enganando" o Cloudinary: Enviamos o APK mas dizemos que é um arquivo binário simples
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);
        formData.append("resource_type", "auto"); 
        formData.append("public_id", file.name.replace(".apk", "")); // Remove a extensão do ID para evitar conflito

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`, {
                method: "POST",
                body: formData
            });
            
            const data = await res.json();

            if (data.secure_url) {
                // Salvamos o link no Firebase. O link do Cloudinary forçará o download.
                await db.collection("arquivos").add({
                    nome: file.name,
                    url: data.secure_url,
                    tamanho: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("APK Sincronizado com Sucesso!");
            } else {
                alert("Erro: " + data.error.message);
            }
        } catch (err) {
            alert("Erro de conexão!");
        } finally {
            btn.innerHTML = "ADICIONAR APK (ZIP MODE)";
            btn.disabled = false;
        }
    });

    db.collection("arquivos").orderBy("criadoEm", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById("appList");
        const adminList = document.getElementById("adminList");
        list.innerHTML = "";
        adminList.innerHTML = "";

        snapshot.forEach((doc) => {
            const app = doc.data();
            list.innerHTML += `
                <div class="app-card p-5 flex justify-between items-center">
                    <div class="truncate pr-4 flex-1">
                        <div class="text-[14px] font-black uppercase text-white truncate leading-none">${app.nome}</div>
                        <div class="text-[10px] text-orange-600 font-bold mt-2 tracking-widest">${app.tamanho}</div>
                    </div>
                    <a href="${app.url}" download="${app.nome}" class="bg-orange-600 px-7 py-3 rounded-xl text-[11px] font-black uppercase shadow-lg shadow-orange-900/40">Instalar</a>
                </div>`;
            
            adminList.innerHTML += `
                <div class="bg-slate-900 p-4 rounded-2xl mb-3 flex justify-between items-center border border-white/5">
                    <span class="text-[11px] font-bold text-gray-400 truncate w-40">${app.nome}</span>
                    <button onclick="remover('${doc.id}')" class="text-red-500 font-black text-[10px]">EXCLUIR</button>
                </div>`;
        });
    });

    async function remover(id) {
        if (confirm("Apagar da nuvem?")) await db.collection("arquivos").doc(id).delete();
    }
</script>
</body>
</html>
